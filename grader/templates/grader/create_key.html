{% extends 'grader/base.html' %}

{% block content %}
<h1>Create New Answer Key</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        <p>
            <label for="title">Key Title (e.g., "software construction second semester marking guide"):</label>
            <input type="text" name="title" id="title" required>
        </p>

        <h2 style="margin-top:20px;">Answers (Questions 1–10)</h2>
        {% for i in "12345678910" %}
        <p style="display: flex; align-items: center; gap: 10px;">
            <label style="min-width: 40px;">Q{{ forloop.counter }}:</label>
            <select name="q{{ forloop.counter }}" required>
                <option value="">--</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>
        </p>
        {% endfor %}

        <button type="submit" class="btn">Save Answer Key</button>
    </form>
</div>
{% endblock %}
